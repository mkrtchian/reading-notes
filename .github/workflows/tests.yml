name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint_and_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - name: Install dependencies
        run: yarn install
      - name: Run eslint
        run: yarn lint
        env:
          CI: true
      - name: Run typescript
        run: yarn type-check
        env:
          CI: true
      - name: Run build
        run: yarn export
        env:
          CI: true
